#cloud-config

packages:
  - wireguard-tools
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw

write_files:
  - path: /etc/sysctl.d/99-wireguard.conf
    content: |
      net.ipv4.ip_forward = 1

  - path: /etc/systemd/system/multiplayer-server.service
    content: |
      [Unit]
      Description=Multiplayer Server
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/multiplayer-server
      EnvironmentFile=/etc/multiplayer-server.env
      WorkingDirectory=/var/lib/multiplayer
      Restart=on-failure
      RestartSec=5
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /etc/nginx/sites-available/multiplayer
    content: |
      server {
          listen 80;
          server_name _;

          location / {
              proxy_pass http://127.0.0.1:8080;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_buffering off;
          }
      }

runcmd:
  - sysctl --system
  - mkdir -p /var/lib/multiplayer
  - mkdir -p /etc/wireguard
  - touch /etc/multiplayer-server.env
  - chmod 600 /etc/multiplayer-server.env
  - ln -sf /etc/nginx/sites-available/multiplayer /etc/nginx/sites-enabled/multiplayer
  - rm -f /etc/nginx/sites-enabled/default
  - systemctl enable nginx
  - systemctl start nginx
  - systemctl enable multiplayer-server
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 51820:51999/udp
  - ufw --force enable
